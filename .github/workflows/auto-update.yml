name: Auto-update providers from upstream

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync latest provider .js files
        run: bash scripts/update.sh
      - name: Bump manifest version + commit
        run: |
          DATE=$(date -u +'%Y.%m.%d.%H%M')
          python3 -c "import json,sys;p='manifest.json';d=json.load(open(p));d['version']='$DATE';open(p,'w').write(json.dumps(d,indent=2))"
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "nuvio-auto-update"
            git config user.email "bot@users.noreply.github.com"
            git add -A
            git commit -m "auto: sync upstream providers $DATE"
            git push
          else
            echo "No changes."
          fi
